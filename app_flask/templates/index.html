<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Detección de Varroa</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background: #f5f5f5;
      }
      h1 {
        color: #333;
      }
      form {
        margin-bottom: 20px;
        padding: 10px;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 0 4px rgba(0, 0, 0, 0.1);
      }
      .results {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .card {
        background: #fff;
        padding: 10px;
        border-radius: 8px;
        box-shadow: 0 0 4px rgba(0, 0, 0, 0.1);
      }
      .images-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .images-row img {
        max-width: 300px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .filename {
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>Detección de Varroa sobre fondo blanco</h1>

    <form method="post" enctype="multipart/form-data">
      <p>
        <label for="images">
          Sube una o varias imágenes (JPG/PNG):
        </label>
      </p>
      <input
        type="file"
        id="images"
        name="images"
        multiple
        accept=".jpg,.jpeg,.png"
      />
      <button type="submit">Procesar</button>
    </form>

    {% if results %}
    <h2>Resultados</h2>
    <div class="results">
      {% for r in results %}
      <div class="card">
        <p class="filename">Archivo: {{ r.filename }}</p>
        <p><strong>Varroas detectadas:</strong> {{ r.count }}</p>
        <div class="images-row">
          <div>
            <p>Original:</p>
            <img src="{{ r.orig }}" alt="original" />
          </div>
          <div>
            <p>Con detecciones:</p>
            <img src="{{ r.det }}" alt="detecciones" />
          </div>
        </div>
      </div>
      {% endfor %}
    </div>
    {% endif %}
  </body>
</html>
